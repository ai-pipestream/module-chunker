import org.gradle.plugins.signing.Sign

plugins {
    alias(libs.plugins.java)
    alias(libs.plugins.quarkus)
    alias(libs.plugins.maven.publish)
    id 'signing'
    alias(libs.plugins.nmcp.single)
    alias(libs.plugins.axion.release)
    alias(libs.plugins.proto.toolchain)
}

def pipestreamBomVersion = findProperty('pipestreamBomVersion')

// Axion-release configuration for automatic versioning
scmVersion {
    tag {
        prefix = 'v'
        initialVersion { config, position -> '0.0.1' }
    }
    checks {
        uncommittedChanges = false
        aheadOfRemote = false
        snapshotDependencies = false
    }
}

// Proto toolchain configuration - uses git-proto-workspace mode for cross-module imports
pipestreamProtos {
    sourceMode = 'git-proto-workspace'
    gitRepo = "https://github.com/ai-pipestream/pipestream-protos.git"
    gitRef = "main"
    generateMutiny = true
    generateDescriptors = true

    modules {
        register("common")
        register("pipeline-module")
        register("semantic-indexing")
    }
}

dependencies {
    // Import pipestream BOM to align all managed versions
    implementation platform("ai.pipestream:pipestream-bom:${pipestreamBomVersion}")

    // Core Quarkus dependencies
    implementation 'io.quarkus:quarkus-arc'
    implementation 'io.quarkus:quarkus-grpc'
    implementation 'io.quarkus:quarkus-rest'
    implementation 'io.quarkus:quarkus-rest-jackson'
    implementation 'io.quarkus:quarkus-smallrye-openapi'
    implementation 'io.quarkus:quarkus-smallrye-health'
    implementation 'io.quarkus:quarkus-smallrye-stork'
    implementation 'io.quarkus:quarkus-hibernate-validator'
    // quarkus-cache provides Caffeine, which NlpPreprocessor uses for the
    // in-memory NLP-result cache (separate from the deleted Redis chunk
    // cache — that one is gone with the rest of the cache package).
    implementation 'io.quarkus:quarkus-cache'
    implementation 'io.quarkus:quarkus-micrometer'
    // Prometheus registry for ambient HTTP/gRPC server metrics on /q/metrics.
    // No Pipestream code in this module injects MeterRegistry directly any more
    // (the chunk cache has been removed); kept for operational observability of
    // the HTTP/gRPC surfaces the framework instruments automatically.
    implementation 'io.quarkus:quarkus-micrometer-registry-prometheus'
    implementation 'io.quarkus:quarkus-container-image-docker'

    // Service Discovery dependencies for Consul
    implementation 'io.smallrye.stork:stork-service-discovery-consul'
    implementation 'io.smallrye.reactive:smallrye-mutiny-vertx-consul-client'

    // Pipestream platform libraries
    implementation 'ai.pipestream:pipestream-quarkus-devservices'
    implementation 'ai.pipestream:quarkus-dynamic-grpc'
    implementation 'ai.pipestream:pipestream-service-registration'
    implementation 'ai.pipestream:pipestream-server'

    // Protobuf JSON utilities
    implementation 'com.google.protobuf:protobuf-java-util'

    // OpenNLP 3.0.0-M1 runtime + model artifacts
    implementation libs.opennlp.runtime
    implementation libs.opennlp.models.tokenizer.en
    implementation libs.opennlp.models.sentdetect.en
    implementation libs.opennlp.models.pos.en
    implementation libs.opennlp.models.lemmatizer.en
    implementation libs.opennlp.models.langdetect

    // Apache Commons utilities
    implementation libs.commons.lang3

    // Testing
    testImplementation platform("ai.pipestream:pipestream-bom:${pipestreamBomVersion}")
    testImplementation 'io.quarkus:quarkus-junit5'
    testImplementation libs.assertj.core
    testImplementation 'io.quarkus:quarkus-junit5-mockito'
    testImplementation 'io.rest-assured:rest-assured'
    testImplementation 'com.networknt:json-schema-validator:3.0.2'
    // BaseWireMockTestResource (extended by ChunkerWireMockTestResource) for
    // the R1-pack-3 integration test that spins up pipestream-wiremock-server
    // as a testcontainer. Version governed by the pipestream BOM imported above.
    testImplementation 'ai.pipestream:pipestream-test-support'

    // Testcontainers for R1-pack-3 integration test. Version governed by the
    // testcontainers-bom, which is transitively included via pipestream-test-support.
    // (We use @QuarkusTestResource for lifecycle — no need for testcontainers-junit-jupiter.)
    testImplementation 'org.testcontainers:testcontainers'

    runtimeOnly libs.quarkus.logging.manager
}

group = 'ai.pipestream.module'
version = "${scmVersion.version}"

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    withJavadocJar()
    withSourcesJar()
}

test {
    systemProperty "java.util.logging.manager", "org.jboss.logmanager.LogManager"
    maxHeapSize = "4g"
    jvmArgs = ["-Xmx4g", "-XX:MaxMetaspaceSize=512m", "--add-opens", "java.base/java.lang=ALL-UNNAMED", "--add-opens", "java.base/java.lang.invoke=ALL-UNNAMED"]
}

// Integration test task (Quarkus-provided). Exclude the `perf` JUnit tag by
// default so ChunkerCourtOpinionsPerfIT does NOT run in normal CI — that test
// burns 30-60s chunking real court opinions and its primary value is the CSV
// trend log it writes to build/chunker-perf.csv.
//
// Opt-in:
//   ./gradlew quarkusIntTest -PrunPerf
//   ./gradlew quarkusIntTest -PrunPerf -PperfOpinions=500
//
// The perfOpinions project property (default 100) is forwarded as the
// perf.opinions system property which ChunkerCourtOpinionsPerfIT reads.
tasks.named('quarkusIntTest').configure {
    useJUnitPlatform {
        if (!project.hasProperty('runPerf')) {
            excludeTags 'perf'
        }
    }
    systemProperty 'perf.opinions', project.findProperty('perfOpinions') ?: '100'
}

compileJava {
    options.encoding = 'UTF-8'
    options.compilerArgs << '-parameters'
}

compileTestJava {
    options.encoding = 'UTF-8'
}

// Configure Javadoc task
tasks.withType(Javadoc).configureEach { task ->
    def opts = task.options
    opts.encoding = 'UTF-8'
    opts.charSet = 'UTF-8'
    opts.locale = 'en'
    opts.addStringOption('Xdoclint:-missing', '-quiet')
    task.exclude('**/internal/**', '**/impl/**', '**/test/**')
}


quarkusDev {
    jvmArgs = ["-Xmx4g", "-XX:MaxMetaspaceSize=512m", "--add-opens", "java.base/java.lang=ALL-UNNAMED", "--add-opens", "java.base/java.lang.invoke=ALL-UNNAMED"]
}

// Publishing configuration
publishing {
    publications {
        maven(MavenPublication) { publication ->
            from components.java
            artifact(file("${buildDir}/quarkus-app/quarkus-run.jar")) { artifact ->
                artifact.classifier = 'runner'
                artifact.builtBy tasks.named('quarkusBuild')
            }
            pom { pom ->
                name.set('Chunker Module')
                description.set('Text Chunking Module for the Pipestream platform')
                url.set('https://github.com/ai-pipestream/module-chunker')

                licenses {
                    license {
                        name.set('MIT License')
                        url.set('https://opensource.org/license/mit')
                    }
                }

                developers {
                    developer {
                        id.set('krickert')
                        name.set('Pipestream Engine Team')
                    }
                }

                scm {
                    connection.set('scm:git:git://github.com/ai-pipestream/module-chunker.git')
                    developerConnection.set('scm:git:ssh://github.com/ai-pipestream/module-chunker.git')
                    url.set('https://github.com/ai-pipestream/module-chunker')
                }
            }
        }
    }

    repositories {
        mavenLocal()
        mavenLocal()

        if (System.getenv("GITHUB_ACTOR") != null) {
            maven {
                name = "GitHubPackages"
                url = uri("https://maven.pkg.github.com/ai-pipestream/module-chunker")
                credentials {
                    username = System.getenv("GITHUB_ACTOR")
                    password = System.getenv("GITHUB_TOKEN")
                }
            }
        }
    }
}

// GPG Signing
signing {
    def signingKey = System.getenv("GPG_PRIVATE_KEY")
    def signingPassword = System.getenv("GPG_PASSPHRASE")

    if (signingKey && signingPassword) {
        useInMemoryPgpKeys(signingKey, signingPassword)
        sign publishing.publications.maven
    }
}

// Ensure signing tasks run before NMCP publication
afterEvaluate {
    tasks.matching { it.name.startsWith("nmcpZipAllPublications") || it.name.startsWith("nmcpPublishAllPublicationsToCentralPortal") }
        .configureEach { nmcpTask ->
            nmcpTask.dependsOn(tasks.withType(Sign))
        }
}

// Maven Central publishing via NMCP
nmcp {
    publishAllPublicationsToCentralPortal {
        username = providers.environmentVariable("MAVEN_CENTRAL_USERNAME")
        password = providers.environmentVariable("MAVEN_CENTRAL_PASSWORD")
        publishingType = "AUTOMATIC"
    }
}
