quarkus.application.name=chunker
quarkus.application.version=@version@
pipestream.build.commit=${GIT_COMMIT:unknown}
pipestream.build.branch=${GIT_BRANCH:unknown}
pipestream.build.time=${BUILD_TIME:unknown}

# Production port allocation
quarkus.http.port=19002

# gRPC Client pointing to registration service via Stork/Consul
quarkus.grpc.clients.registration-service.host=registration-service
quarkus.grpc.clients.registration-service.name-resolver=stork

# gRPC Client for platform registration service via Stork/Consul
quarkus.grpc.clients.platform-registration-service.host=platform-registration
quarkus.grpc.clients.platform-registration-service.name-resolver=stork

# Stork service discovery configuration
quarkus.stork.registration-service.service-discovery.type=consul
quarkus.stork.registration-service.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.registration-service.service-discovery.consul-port=${CONSUL_PORT:8500}

# Stork service discovery for platform registration service
quarkus.stork.platform-registration-service.service-discovery.type=consul
quarkus.stork.platform-registration-service.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.platform-registration-service.service-discovery.consul-port=${CONSUL_PORT:8500}

# Development override - use localhost Consul in dev mode  
%dev.quarkus.stork.registration-service.service-discovery.consul-host=localhost
%dev.quarkus.stork.platform-registration-service.service-discovery.consul-host=localhost

# Module configuration
module.name=chunker
module.type=pipestream
module.description=Chunks data for the masses but for now the body of a doc

# ======================================================================================================================
# Pipestream Service Registration Configuration
# ======================================================================================================================
pipestream.server.class=module
pipestream.registration.type=MODULE
pipestream.registration.mode=grpc
pipestream.registration.description=Text chunking module for document processing pipeline
pipestream.registration.capabilities=text-chunking,nlp-processing,document-segmentation
pipestream.registration.tags=chunker,nlp,text-processing,module

# Disable for tests
%test.pipestream.registration.enabled=false

# Health check configuration - use localhost for local development
module.health.check.host=localhost

# This forces the generation of an OpenAPI 3.1.0 document
# The schemas within it are compatible with JSON Schema 2020-12 (newer than Draft 7)
mp.openapi.version=3.1.0

# HTTP Request Body Size Configuration (40MB for chunker endpoints)
quarkus.http.limits.max-body-size=40M
quarkus.http.limits.max-form-attribute-size=40M

# Logging Configuration - reduce noise
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG
quarkus.log.category."ai.pipestream.consul.client.service.registry.consul.ConsulModuleRegistryService".level=DEBUG
quarkus.log.category."io.vertx.ext.consul".level=WARN
quarkus.log.category."io.quarkus.grpc".level=WARN

# Quinoa Configuration - working setup
# Enable in dev mode to serve Vue app at root

# Build the Vue app and serve it statically

# UI configuration

# Chunker uses default port 5173

# Context path: module under /modules/<name> (parser is reference)

# Test settings
%test.quarkus.http.port=0


# Kafka Dev Services - enabled, will use compose services when available
%dev.quarkus.kafka.devservices.enabled=true
